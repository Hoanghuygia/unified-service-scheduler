name: CD

on:
  # Trigger only when the CI workflow has completed on the main branch.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

# Prevent overlapping deployments to the same environment.
concurrency:
  group: ec2-production-deploy
  cancel-in-progress: true

jobs:
  deploy-ec2:
    name: Deploy To AWS EC2
    runs-on: ubuntu-latest
    # Deploy only if CI finished successfully for main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Deploy over SSH
        # Connect to EC2 and run the deployment script in order.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/unified-service-scheduler
            nvm use 20
            which pm2 || npm install -g pm2
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart unified-service-scheduler --update-env